version: "3.9"

# =============================================================================
# LMS Corporativo — Docker Compose PRODUCCIÓN
# Uso: docker compose -f docker-compose.prod.yml up -d
# Requisitos: archivo .env en la raíz del proyecto (ver .env.example)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Base de datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Redis (broker Celery + caché JWT blacklist)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Backend Django (Gunicorn)
  # entrypoint.sh ejecuta: migrate → create_default_admin → collectstatic
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      target: production
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - backend_media:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Celery Worker (tareas asíncronas: emails, certificados, sync AD)
  # ---------------------------------------------------------------------------
  celery-worker:
    build:
      context: ./backend
      target: production
    command: >
      celery -A config worker
        --loglevel=warning
        --concurrency=4
        --without-gossip
        --without-mingle
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Celery Beat (tareas programadas: sync AD diario)
  # ---------------------------------------------------------------------------
  celery-beat:
    build:
      context: ./backend
      target: production
    command: >
      celery -A config beat
        --loglevel=warning
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Frontend React (build estático servido por nginx interno)
  # VITE_API_URL se inyecta en build-time — debe coincidir con el dominio real
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy + SSL termination)
  # Puerto 80 → redirect HTTPS
  # Puerto 443 → TLS, rutas /api/ /admin/ → backend, resto → frontend
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/staticfiles:ro
      - backend_media:/media:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Certbot (renueva SSL automáticamente — corre cada 12 h)
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    restart: unless-stopped

# =============================================================================
# Volúmenes persistentes
# =============================================================================
volumes:
  postgres_prod_data:      # datos PostgreSQL
  backend_media:           # archivos subidos por usuarios (certificados, etc.)
  static_files:            # Django staticfiles (compartido con nginx)
  letsencrypt_certs:       # certificados SSL Let's Encrypt
  certbot_www:             # reto ACME para renovación automática

# =============================================================================
# Red interna (ningún servicio expone puertos salvo nginx)
# =============================================================================
networks:
  internal:
    driver: bridge
