# =============================================================================
# LMS Corporativo — Nginx configuración PRODUCCIÓN
# Edita TUDOMINIO.COM con tu dominio real antes de levantar el stack
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP → HTTPS redirect (y reto ACME para certbot)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name TUDOMINIO.COM www.TUDOMINIO.COM;

    # Certbot ACME challenge — necesario para emitir y renovar el certificado
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS — servidor principal
# ---------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name TUDOMINIO.COM www.TUDOMINIO.COM;

    # Certificados Let's Encrypt (generados con el script init-ssl.sh)
    ssl_certificate     /etc/letsencrypt/live/TUDOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TUDOMINIO.COM/privkey.pem;

    # Parámetros TLS modernos
    ssl_session_timeout  1d;
    ssl_session_cache    shared:SSL:50m;
    ssl_session_tickets  off;
    ssl_protocols        TLSv1.2 TLSv1.3;
    ssl_ciphers          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # Cabeceras de seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options              "DENY"                            always;
    add_header X-Content-Type-Options       "nosniff"                         always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()" always;

    # Tamaño máximo de carga (videos de cursos)
    client_max_body_size 500M;

    # Timeouts para cargas grandes
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # -------------------------------------------------------------------------
    # Archivos estáticos Django (CSS, JS, admin) — caché agresivo
    # -------------------------------------------------------------------------
    location /static/ {
        alias /staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # -------------------------------------------------------------------------
    # Archivos media (certificados generados, imágenes subidas)
    # -------------------------------------------------------------------------
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # -------------------------------------------------------------------------
    # Backend API Django (/api/, /admin/, /auth/)
    # -------------------------------------------------------------------------
    location ~ ^/(api|admin|auth)/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # -------------------------------------------------------------------------
    # Frontend SPA (React — todo lo demás)
    # -------------------------------------------------------------------------
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
